<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Tracker Hub</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Icona per la scheda del Browser -->
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <!-- Icona di riserva per browser vecchi/Firefox -->
    <link rel="alternate icon" type="image/png" href="icon-192.png">
    <!-- Icona per iPhone/iOS (PWA) -->
    <link rel="apple-touch-icon" href="icon-512.png">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

    
  <link rel="stylesheet" href="css/index.css">

</head>

<body>

    <!-- Luci di sfondo -->
    <div class="glow-film"></div>
    <div class="glow-tv"></div>

    <div class="hub-container">
        <div class="hub-header">
            <h1>Bentornato</h1>
            <p>Cosa vuoi tracciare oggi?</p>
        </div>

        <div class="cards-wrapper">
            <!-- CARD FILM -->
            <a href="film_tracker.html" class="hub-card card-film">
                <div class="icon-wrapper">
                    <i class="fas fa-film"></i>
                </div>
                <div class="card-content">
                    <h2>Film</h2>
                    <p>Gestisci i tuoi film, scopri i voti e le uscite digitali.</p>
                </div>
                <i class="fas fa-chevron-right card-arrow"></i>
            </a>

            <!-- CARD SERIE TV -->
            <a href="serietv_tracker.html" class="hub-card card-tv">
                <div class="icon-wrapper">
                    <i class="fas fa-tv"></i>
                </div>
                <div class="card-content">
                    <h2>Serie TV</h2>
                    <p>Traccia i tuoi episodi, aggiorna il rewatch e segui gli show.</p>
                </div>
                <i class="fas fa-chevron-right card-arrow"></i>
            </a>
        </div>
    </div>

    
  <script src="js/index.js"></script>

</body>

</html>
