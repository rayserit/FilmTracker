<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Tracker Hub</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Icona per il Browser -->
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <!-- Per Firefox Android e altri browser -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <!-- Icona per iPhone/iPad (PWA) -->
    <link rel="apple-touch-icon" href="icon.svg">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

    <style>
        :root {
            --film-color: #3A86FF;
            --tv-color: #2a9d8f;
            --bg-color: #121212;
            --card-bg: rgba(30, 30, 30, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Luci ambientali sfocate sullo sfondo */
        .glow-film {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: var(--film-color);
            filter: blur(150px);
            opacity: 0.4;
            z-index: -1;
            border-radius: 50%;
        }

        .glow-tv {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: var(--tv-color);
            filter: blur(150px);
            opacity: 0.4;
            z-index: -1;
            border-radius: 50%;
        }

        .hub-container {
            width: 90%;
            max-width: 800px;
            padding: 20px;
            z-index: 10;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hub-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .hub-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .hub-header p {
            color: #aaa;
            font-size: 1rem;
        }

        .cards-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .cards-wrapper {
                flex-direction: row;
            }
        }

        .hub-card {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 30px 25px;
            background: var(--card-bg);
            border-radius: 24px;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Hover & Active states */
        .hub-card:hover {
            transform: translateY(-5px);
        }

        .hub-card:active {
            transform: scale(0.96);
        }

        /* Colori specifici per Film */
        .card-film:hover {
            border-color: rgba(58, 134, 255, 0.5);
            box-shadow: 0 10px 30px rgba(58, 134, 255, 0.2);
        }

        .card-film .icon-wrapper {
            background: linear-gradient(135deg, #3A86FF, #00B4D8);
        }

        /* Colori specifici per TV */
        .card-tv:hover {
            border-color: rgba(42, 157, 143, 0.5);
            box-shadow: 0 10px 30px rgba(42, 157, 143, 0.2);
        }

        .card-tv .icon-wrapper {
            background: linear-gradient(135deg, #2a9d8f, #4ecdc4);
        }

        .icon-wrapper {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
            margin-right: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .card-content h2 {
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .card-content p {
            color: #aaa;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .card-arrow {
            margin-left: auto;
            font-size: 1.2rem;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.3s;
        }

        .hub-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(5px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- Luci di sfondo -->
    <div class="glow-film"></div>
    <div class="glow-tv"></div>

    <div class="hub-container">
        <div class="hub-header">
            <h1>Bentornato</h1>
            <p>Cosa vuoi tracciare oggi?</p>
        </div>

        <div class="cards-wrapper">
            <!-- CARD FILM -->
            <a href="film_tracker.html" class="hub-card card-film">
                <div class="icon-wrapper">
                    <i class="fas fa-film"></i>
                </div>
                <div class="card-content">
                    <h2>Film</h2>
                    <p>Gestisci i tuoi film, scopri i voti e le uscite digitali.</p>
                </div>
                <i class="fas fa-chevron-right card-arrow"></i>
            </a>

            <!-- CARD SERIE TV -->
            <a href="serietv_tracker.html" class="hub-card card-tv">
                <div class="icon-wrapper">
                    <i class="fas fa-tv"></i>
                </div>
                <div class="card-content">
                    <h2>Serie TV</h2>
                    <p>Traccia i tuoi episodi, aggiorna il rewatch e segui gli show.</p>
                </div>
                <i class="fas fa-chevron-right card-arrow"></i>
            </a>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrato!', reg))
                    .catch(err => console.log('SW Errore:', err));
            });
        }
    </script>
</body>

</html>
